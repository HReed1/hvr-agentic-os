<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
    
    :root {
        --bg-color: #121212;
        --card-bg: rgba(255, 255, 255, 0.05);
        --text-color: #e0e0e0;
        --border-color: rgba(255, 255, 255, 0.1);
        --accent-color: #bb86fc;
    }
    
    body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    header {
        padding: 20px 40px;
        background: var(--card-bg);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        backdrop-filter: blur(10px);
    }
    
    .board-container {
        display: flex;
        gap: 20px;
        padding: 20px 40px;
        overflow-x: auto;
        flex-grow: 1;
    }
    
    .column {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        min-width: 300px;
        max-width: 300px;
        display: flex;
        flex-direction: column;
        backdrop-filter: blur(8px);
    }

    .column-header {
        padding: 15px;
        font-weight: 600;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .task-list {
        padding: 15px;
        flex-grow: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 50px;
    }
    
    .task {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--border-color);
        padding: 15px;
        border-radius: 8px;
        cursor: grab;
        transition: transform 0.2s, background 0.2s;
    }
    
    .task:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.12);
    }
    
    .task:active {
        cursor: grabbing;
    }
    
    .modal-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        backdrop-filter: blur(4px);
    }
    
    .modal {
        background: #1e1e1e;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 30px;
        width: 400px;
        max-width: 90%;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    .modal h2 { margin-top: 0; }
    
    input, textarea {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--border-color);
        color: white;
        border-radius: 6px;
        box-sizing: border-box;
    }
    
    button {
        background: var(--accent-color);
        color: #000;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: opacity 0.2s;
    }
    
    button:hover {
        opacity: 0.8;
    }

    .btn-secondary {
        background: rgba(255,255,255,0.1);
        color: white;
    }
    
    .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 20px;
    }

    .add-task-btn {
        background: transparent;
        color: var(--text-color);
        border: 1px dashed var(--border-color);
        width: 100%;
        margin-top: 10px;
    }
    
    .add-task-btn:hover {
        background: rgba(255,255,255,0.05);
    }
</style>
</head>
<body>

<header>
    <h1>Kanban Board</h1>
    <button onclick="openColModal()">+ New Column</button>
</header>

<div class="board-container" id="board">
</div>

<div class="modal-overlay" id="taskDetailModal">
    <div class="modal">
        <h2 id="detailTitle">Task Title</h2>
        <p id="detailDesc" style="color: #aaa;"></p>
        <p><small style="color: var(--accent-color);" id="detailTags"></small></p>
        <div class="modal-actions">
            <button class="btn-secondary" onclick="closeModal('taskDetailModal')">Close</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="createTaskModal">
    <div class="modal">
        <h2>New Task</h2>
        <input type="hidden" id="taskColId">
        <input type="text" id="taskTitle" placeholder="Title">
        <textarea id="taskDesc" placeholder="Description"></textarea>
        <input type="text" id="taskTags" placeholder="Tags (comma separated)">
        <div class="modal-actions">
            <button class="btn-secondary" onclick="closeModal('createTaskModal')">Cancel</button>
            <button id="saveTaskBtn" onclick="submitTask()">Save</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="createColModal">
    <div class="modal">
        <h2>New Column</h2>
        <input type="text" id="colName" placeholder="Column Name">
        <div class="modal-actions">
            <button class="btn-secondary" onclick="closeModal('createColModal')">Cancel</button>
            <button id="saveColBtn" onclick="submitCol()">Save</button>
        </div>
    </div>
</div>

<script>
    let draggedTaskId = null;
    const BOARD_ID = 1;

    async function loadBoard() {
        const res = await fetch(`/api/board/${BOARD_ID}`);
        if(res.ok) {
            const data = await res.json();
            renderBoard(data);
        }
    }

    function renderBoard(board) {
        const container = document.getElementById('board');
        container.innerHTML = '';
        board.columns.forEach(col => {
            const colEl = document.createElement('div');
            colEl.className = 'column';
            colEl.innerHTML = `
                <div class="column-header">
                    <span>${col.name}</span>
                </div>
                <div class="task-list" ondragover="allowDrop(event)" ondrop="drop(event, ${col.id})">
                    ${col.tasks.map(t => `
                        <div class="task" draggable="true" 
                             ondragstart="drag(event, ${t.id})" 
                             onclick="openTaskDetail('${escapeHtml(t.title)}', '${escapeHtml(t.description || '')}', '${escapeHtml(t.tags || '')}')">
                            ${escapeHtml(t.title)}
                        </div>
                    `).join('')}
                    <button class="add-task-btn" onclick="openTaskModal(${col.id})">+ Add Task</button>
                </div>
            `;
            container.appendChild(colEl);
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>'"]/g, 
            tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag]));
    }

    function allowDrop(ev) {
        ev.preventDefault();
    }

    function drag(ev, id) {
        draggedTaskId = id;
    }

    async function drop(ev, colId) {
        ev.preventDefault();
        if(draggedTaskId) {
            await fetch(`/api/tasks/${draggedTaskId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({column_id: colId})
            });
            loadBoard();
            draggedTaskId = null;
        }
    }

    function openTaskDetail(title, desc, tags) {
        document.getElementById('detailTitle').innerText = title;
        document.getElementById('detailDesc').innerText = desc || 'No description';
        document.getElementById('detailTags').innerText = tags || '';
        document.getElementById('taskDetailModal').style.display = 'flex';
    }

    function openTaskModal(colId) {
        document.getElementById('taskColId').value = colId;
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDesc').value = '';
        document.getElementById('taskTags').value = '';
        document.getElementById('createTaskModal').style.display = 'flex';
    }

    function openColModal() {
        document.getElementById('colName').value = '';
        document.getElementById('createColModal').style.display = 'flex';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    async function submitTask() {
        const title = document.getElementById('taskTitle').value;
        const desc = document.getElementById('taskDesc').value;
        const tags = document.getElementById('taskTags').value;
        const colId = document.getElementById('taskColId').value;
        
        if(!title) return;

        await fetch('/api/tasks', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                title: title,
                description: desc,
                tags: tags,
                column_id: parseInt(colId)
            })
        });
        closeModal('createTaskModal');
        loadBoard();
    }

    async function submitCol() {
        const name = document.getElementById('colName').value;
        if(!name) return;

        await fetch('/api/columns', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name, board_id: BOARD_ID})
        });
        closeModal('createColModal');
        loadBoard();
    }

    loadBoard();
</script>
</body>
</html>
