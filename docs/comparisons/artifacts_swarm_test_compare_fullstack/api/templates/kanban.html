<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kanban</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928DAB);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .board {
            display: flex;
            gap: 20px;
            flex: 1;
            overflow-x: auto;
        }
        .column {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            width: 300px;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .column h3 {
            margin: 0;
            font-size: 1.2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }
        .task {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 8px;
            cursor: grab;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .task:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.25);
        }
        .task:active {
            cursor: grabbing;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #2b2b36;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }
        .modal-content h2 {
            margin-top: 0;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
        }
        input, textarea {
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
        button {
            background: #6c5ce7;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover {
            background: #a29bfe;
        }
        .dropzone {
            flex: 1;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Kanban</h1>
        <div>
            <button onclick="openCreateColumnModal()">Add Column</button>
            <button onclick="openCreateModal()">Add Task</button>
        </div>
    </div>
    <div class="board" id="board"></div>

    <div class="modal" id="createModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('createModal')">&times;</span>
            <h2>Create Task</h2>
            <input type="hidden" id="columnId">
            <input type="text" name="title" id="taskTitle" placeholder="Task Title" required>
            <textarea name="description" id="taskDesc" placeholder="Task Description" rows="4"></textarea>
            <input type="text" name="tags" id="taskTags" placeholder="Tags (comma separated)">
            <button onclick="saveTask()">Save</button>
        </div>
    </div>

    <div class="modal" id="createColumnModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('createColumnModal')">&times;</span>
            <h2>Create Column</h2>
            <input type="text" id="colName" placeholder="Column Name" required>
            <button onclick="saveColumn()">Create</button>
        </div>
    </div>

    <div class="modal" id="viewModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('viewModal')">&times;</span>
            <h2 id="viewTitle"></h2>
            <p id="viewDesc"></p>
            <p><small id="viewTags"></small></p>
        </div>
    </div>

    <script>
        let draggedTaskId = null;
        let columnsData = [];

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            columnsData.forEach(col => {
                const colEl = document.createElement('div');
                colEl.className = 'column';
                colEl.innerHTML = `<h3>${col.name}</h3>`;
                
                const dropzone = document.createElement('div');
                dropzone.className = 'dropzone';
                dropzone.ondragover = (e) => e.preventDefault();
                dropzone.ondrop = (e) => drop(e, col.id);
                
                col.tasks.forEach(task => {
                    const taskEl = document.createElement('div');
                    taskEl.className = 'task';
                    taskEl.draggable = true;
                    taskEl.ondragstart = (e) => dragStart(e, task.id);
                    taskEl.onclick = () => openViewModal(task);
                    taskEl.textContent = task.title;
                    dropzone.appendChild(taskEl);
                });
                
                colEl.appendChild(dropzone);
                board.appendChild(colEl);
            });
        }

        async function loadBoard() {
            const res = await fetch('/api/state');
            const data = await res.json();
            if(data.length === 0) return;
            columnsData = data[0].columns;
            renderBoard();
        }

        function dragStart(e, id) {
            draggedTaskId = id;
        }

        async function drop(e, colId) {
            e.preventDefault();
            if(!draggedTaskId) return;
            
            let movedTask = null;
            for (let c of columnsData) {
                const idx = c.tasks.findIndex(t => t.id === draggedTaskId);
                if (idx > -1) {
                    movedTask = c.tasks.splice(idx, 1)[0];
                    break;
                }
            }
            if (movedTask) {
                const targetCol = columnsData.find(c => c.id === colId);
                if (targetCol) targetCol.tasks.push(movedTask);
                renderBoard();
            }

            const tid = draggedTaskId;
            draggedTaskId = null;
            
            await fetch(`/api/tasks/${tid}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({column_id: colId})
            });
            loadBoard();
        }

        function openCreateModal() {
            document.getElementById('columnId').value = columnsData.length > 0 ? columnsData[0].id : 1;
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDesc').value = '';
            document.getElementById('taskTags').value = '';
            document.getElementById('createModal').classList.add('active');
        }

        function openCreateColumnModal() {
            document.getElementById('colName').value = '';
            document.getElementById('createColumnModal').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        async function saveTask() {
            const title = document.getElementById('taskTitle').value;
            const desc = document.getElementById('taskDesc').value;
            const tags = document.getElementById('taskTags').value;
            const colId = parseInt(document.getElementById('columnId').value);
            
            const col = columnsData.find(c => c.id === colId);
            if (col) {
                col.tasks.push({ id: Date.now(), title: title, description: desc, tags: tags });
                renderBoard();
            }
            closeModal('createModal');

            const payload = {
                title: title,
                description: desc,
                tags: tags,
                column_id: colId
            };
            
            await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            loadBoard();
        }

        async function saveColumn() {
            const name = document.getElementById('colName').value;
            
            columnsData.push({ id: Date.now(), name: name, tasks: [] });
            renderBoard();
            closeModal('createColumnModal');

            await fetch('/api/columns', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: name, board_id: 1})
            });
            loadBoard();
        }

        function openViewModal(task) {
            document.getElementById('viewTitle').textContent = task.title;
            document.getElementById('viewDesc').textContent = task.description;
            document.getElementById('viewTags').textContent = 'Tags: ' + task.tags;
            document.getElementById('viewModal').classList.add('active');
        }

        loadBoard();
    </script>
</body>
</html>
