<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        :root { --bg: #0f1115; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --text: #e2e8f0; --accent: #6366f1; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 30px; overflow-x: auto; }
        h1 { font-weight: 600; margin: 0; font-size: 1.8rem; }
        .board-header { display: flex; gap: 15px; margin-bottom: 30px; align-items: center; }
        .board-container { display: flex; gap: 20px; align-items: flex-start; padding-bottom: 20px; }
        .column { background: var(--glass); border: 1px solid var(--border); border-radius: 12px; width: 320px; padding: 15px; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; backdrop-filter: blur(10px); }
        .col-header { font-weight: 600; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
        .task { background: rgba(255, 255, 255, 0.04); padding: 14px; border-radius: 8px; cursor: grab; transition: transform 0.2s, background 0.2s, border-color 0.2s; border: 1px solid transparent; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .task:hover { transform: translateY(-3px); background: rgba(255, 255, 255, 0.08); border-color: var(--accent); }
        .task:active { cursor: grabbing; }
        .task.dragging { opacity: 0.5; }
        .btn { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: 500; font-size: 0.9rem; transition: background 0.2s; }
        .btn:hover { background: #4f46e5; }
        .btn-small { padding: 4px 10px; font-size: 1rem; border-radius: 4px; background: transparent; border: 1px solid var(--border); color: var(--text); cursor: pointer; transition: background 0.2s; }
        .btn-small:hover { background: var(--border); }
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal { background: #1e1e24; border: 1px solid var(--border); border-radius: 12px; padding: 25px; width: 420px; max-width: 90%; box-shadow: 0 15px 35px rgba(0,0,0,0.4); transform: scale(0.95); transition: transform 0.3s; }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal h2 { margin-top: 0; font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }
        .modal input, .modal textarea { width: 100%; box-sizing: border-box; margin-bottom: 15px; padding: 12px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); color: white; border-radius: 6px; font-family: inherit; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 10px; }
        .tags-display { font-size: 0.85rem; color: #94a3b8; margin-top: 15px; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="board-header">
        <h1 id="board-name">Loading...</h1>
        <button class="btn" onclick="openModal('col-modal')">+ New Column</button>
    </div>
    <div class="board-container" id="board"></div>

    <div class="modal-overlay" id="col-modal">
        <div class="modal">
            <h2>New Column</h2>
            <input type="text" id="col-name" placeholder="Enter column name...">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('col-modal')">Cancel</button>
                <button class="btn" onclick="createColumn()">Create Column</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="task-modal">
        <div class="modal">
            <h2>New Task</h2>
            <input type="hidden" id="task-col-id">
            <input type="text" id="task-title" placeholder="Task Title">
            <textarea id="task-desc" placeholder="Add a description..." rows="4"></textarea>
            <input type="text" id="task-tags" placeholder="Tags (e.g. UI, Backend)">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('task-modal')">Cancel</button>
                <button class="btn" onclick="createTask()">Create Task</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="detail-modal">
        <div class="modal">
            <h2 id="detail-title"></h2>
            <p id="detail-desc" style="line-height: 1.5; color: #cbd5e1;"></p>
            <div class="tags-display" id="detail-tags"></div>
            <div class="modal-actions" style="margin-top: 25px;">
                <button class="btn btn-secondary" onclick="closeModal('detail-modal')">Close</button>
            </div>
        </div>
    </div>

    <script>
        const BOARD_ID = 1;

        async function fetchBoard() {
            const res = await fetch(`/api/kanban/boards/${BOARD_ID}/state`);
            if (!res.ok) return;
            const data = await res.json();
            document.getElementById('board-name').innerText = data.name;
            renderBoard(data.columns);
        }

        function renderBoard(columns) {
            const container = document.getElementById('board');
            container.innerHTML = '';
            columns.forEach(col => {
                const colEl = document.createElement('div');
                colEl.className = 'column';
                colEl.dataset.id = col.id;
                colEl.innerHTML = `
                    <div class="col-header">
                        ${col.name}
                        <button class="btn-small" onclick="prepTaskModal(${col.id})">+</button>
                    </div>
                    <div class="task-list" style="min-height: 80px; flex-grow: 1; display: flex; flex-direction: column; gap: 10px;"></div>
                `;
                
                const listEl = colEl.querySelector('.task-list');
                col.tasks.forEach(task => {
                    const tEl = document.createElement('div');
                    tEl.className = 'task';
                    tEl.draggable = true;
                    tEl.dataset.id = task.id;
                    tEl.innerText = task.title;
                    
                    tEl.onclick = () => openDetailModal(task);
                    tEl.ondragstart = (e) => {
                        e.dataTransfer.setData('text/plain', task.id);
                        setTimeout(() => tEl.classList.add('dragging'), 0);
                    };
                    tEl.ondragend = () => tEl.classList.remove('dragging');
                    listEl.appendChild(tEl);
                });

                colEl.ondragover = e => { e.preventDefault(); };
                colEl.ondrop = async e => {
                    e.preventDefault();
                    const taskId = e.dataTransfer.getData('text/plain');
                    if(taskId) {
                        await updateTaskColumn(taskId, col.id);
                        fetchBoard();
                    }
                };

                container.appendChild(colEl);
            });
        }

        async function updateTaskColumn(taskId, colId) {
            await fetch(`/api/kanban/tasks/${taskId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({column_id: colId})
            });
        }

        function openModal(id) { 
            const m = document.getElementById(id);
            m.style.display = 'flex';
            setTimeout(() => m.classList.add('active'), 10);
            if(id === 'col-modal') document.getElementById('col-name').value = '';
        }
        function closeModal(id) { 
            const m = document.getElementById(id);
            m.classList.remove('active');
            setTimeout(() => m.style.display = 'none', 300);
        }
        
        function prepTaskModal(colId) { 
            document.getElementById('task-col-id').value = colId; 
            document.getElementById('task-title').value = '';
            document.getElementById('task-desc').value = '';
            document.getElementById('task-tags').value = '';
            openModal('task-modal');
        }
        function openDetailModal(task) {
            document.getElementById('detail-title').innerText = task.title;
            document.getElementById('detail-desc').innerText = task.description || 'No description provided.';
            document.getElementById('detail-tags').innerText = task.tags ? `Tags: ${task.tags}` : 'No tags';
            openModal('detail-modal');
        }

        async function createColumn() {
            const name = document.getElementById('col-name').value;
            if(!name) return;
            await fetch(`/api/kanban/boards/${BOARD_ID}/columns`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name})
            });
            closeModal('col-modal');
            fetchBoard();
        }

        async function createTask() {
            const colId = document.getElementById('task-col-id').value;
            const title = document.getElementById('task-title').value;
            const description = document.getElementById('task-desc').value;
            const tags = document.getElementById('task-tags').value;
            if(!title) return;
            await fetch(`/api/kanban/columns/${colId}/tasks`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title, description, tags})
            });
            closeModal('task-modal');
            fetchBoard();
        }

        fetchBoard();
    </script>
</body>
</html>
