<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kanban Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --border-color: #333;
            --text-primary: #fff;
            --text-secondary: #aaa;
            --accent: #6200ea;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .board {
            display: flex;
            gap: 20px;
            flex: 1;
            overflow-x: auto;
        }
        .column {
            background-color: var(--surface-color);
            border-radius: 8px;
            width: 300px;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }
        .column-header {
            padding: 15px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-list {
            padding: 10px;
            flex: 1;
            overflow-y: auto;
            min-height: 50px;
        }
        .task {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            transition: transform 0.2s, background 0.2s;
        }
        .task:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
        }
        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal {
            background: var(--surface-color);
            padding: 24px;
            border-radius: 8px;
            width: 400px;
            border: 1px solid var(--border-color);
        }
        .modal h2 { margin-top: 0; }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        .form-group label { margin-bottom: 5px; font-size: 14px; color: var(--text-secondary); }
        .form-group input, .form-group textarea, .form-group select {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 8px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .close-btn { background: transparent; border: 1px solid var(--border-color); color: #fff; }
    </style>
</head>
<body>

<header>
    <h1>Kanban</h1>
    <button class="btn" onclick="openAddTaskModal()">Add Task</button>
</header>

<div class="board" id="board">
</div>

<div class="modal-overlay" id="addTaskModal">
    <div class="modal">
        <h2>Add Task</h2>
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" id="taskTitle">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" id="taskDesc"></textarea>
        </div>
        <div class="form-group">
            <label>Tags</label>
            <input type="text" name="tags" id="taskTags">
        </div>
        <div class="form-group">
            <label>Column</label>
            <select id="taskColumn" name="column"></select>
        </div>
        <div class="modal-actions">
            <button class="btn close-btn" onclick="closeModal('addTaskModal')">Cancel</button>
            <button class="btn submit-btn" onclick="submitTask()">Save</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="viewTaskModal">
    <div class="modal">
        <h2 id="viewTaskTitle"></h2>
        <p style="color: var(--text-secondary);" id="viewTaskDesc"></p>
        <div style="margin-top: 15px;">
            <span style="background: var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 12px;" id="viewTaskTags"></span>
        </div>
        <div class="modal-actions">
            <button class="btn close-btn" onclick="closeModal('viewTaskModal')">Close</button>
        </div>
    </div>
</div>

<script>
    const API_URL = '/api';
    let boardId = 1;

    async function fetchBoard() {
        const res = await fetch(`${API_URL}/boards/${boardId}`);
        if(res.ok) {
            const board = await res.json();
            renderBoard(board);
            populateColumnSelect(board.columns);
        }
    }

    function renderBoard(board) {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';
        board.columns.forEach(col => {
            const colEl = document.createElement('div');
            colEl.className = 'column';
            colEl.innerHTML = `
                <div class="column-header">${col.name}</div>
                <div class="task-list" data-column-id="${col.id}" ondragover="allowDrop(event)" ondrop="drop(event, ${col.id})">
                    ${col.tasks.map(t => `
                        <div class="task" draggable="true" ondragstart="drag(event, ${t.id})" onclick="openViewTaskModal('${t.title}', '${t.description}', '${t.tags}')">
                            ${t.title}
                        </div>
                    `).join('')}
                </div>
            `;
            boardEl.appendChild(colEl);
        });
    }

    function populateColumnSelect(columns) {
        const select = document.getElementById('taskColumn');
        select.innerHTML = columns.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    function openAddTaskModal() {
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDesc').value = '';
        document.getElementById('taskTags').value = '';
        document.getElementById('addTaskModal').style.display = 'flex';
    }

    function openViewTaskModal(title, desc, tags) {
        document.getElementById('viewTaskTitle').innerText = title;
        document.getElementById('viewTaskDesc').innerText = desc;
        document.getElementById('viewTaskTags').innerText = tags;
        document.getElementById('viewTaskModal').style.display = 'flex';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    async function submitTask() {
        const title = document.getElementById('taskTitle').value;
        const description = document.getElementById('taskDesc').value;
        const tags = document.getElementById('taskTags').value;
        const colVal = document.getElementById('taskColumn').value;
        if (!colVal) return;
        const payload = {
            title: title,
            description: description,
            tags: tags,
            column_id: parseInt(colVal)
        };
        const res = await fetch(`${API_URL}/tasks/`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        if(res.ok) {
            closeModal('addTaskModal');
            fetchBoard();
        }
    }

    function allowDrop(ev) {
        ev.preventDefault();
    }

    function drag(ev, taskId) {
        ev.dataTransfer.setData("taskId", taskId);
    }

    async function drop(ev, columnId) {
        ev.preventDefault();
        const taskId = ev.dataTransfer.getData("taskId");
        if(!taskId) return;
        const res = await fetch(`${API_URL}/tasks/${taskId}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ column_id: columnId })
        });
        if(res.ok) {
            fetchBoard();
        }
    }

    document.addEventListener("DOMContentLoaded", fetchBoard);
</script>
</body>
</html>
