<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #38bdf8;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }
        .dashboard {
            display: flex;
            padding: 2rem;
            gap: 1.5rem;
            align-items: flex-start;
            min-height: 100vh;
        }
        .column {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 300px;
            min-height: 200px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.2s ease;
        }
        .column h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }
        .task-list {
            min-height: 50px;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .task-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }
        .task-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.2);
        }
        .task-card.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }
        .btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-ghost {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal {
            background: #1e293b;
            padding: 2rem;
            border-radius: 16px;
            width: 400px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: #94a3b8; }
        .form-group input, .form-group textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            padding: 0.75rem;
            border-radius: 6px;
            font-family: inherit;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="dashboard" class="dashboard">
        <!-- Rendered via JS -->
    </div>

    <!-- Modal for Task/Column Creation/View -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal">
            <h3 id="modalTitle">New Task</h3>
            <div id="modalContent"></div>
            <div style="display:flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.5rem;">
                <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                <button id="modalAction" class="btn">Save</button>
            </div>
        </div>
    </div>

    <script>
        let currentBoard = null;
        const dashboard = document.getElementById('dashboard');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalContent = document.getElementById('modalContent');
        const modalTitle = document.getElementById('modalTitle');
        const modalAction = document.getElementById('modalAction');

        async function init() {
            const res = await fetch('/api/v1/boards/1');
            if (res.ok) {
                currentBoard = await res.json();
                render();
            }
        }

        function render() {
            dashboard.innerHTML = '';
            currentBoard.columns.forEach(col => {
                const colEl = document.createElement('div');
                colEl.className = 'column';
                colEl.innerHTML = `
                    <h2>
                        ${col.name}
                        <button class="btn btn-ghost" style="padding: 2px 8px;" onclick="openTaskModal(${col.id})">+</button>
                    </h2>
                    <div class="task-list" data-column-id="${col.id}" ondragover="allowDrop(event)" ondrop="drop(event)">
                        ${col.tasks.sort((a,b) => a.order - b.order).map(task => `
                            <div class="task-card" draggable="true" 
                                 ondragstart="drag(event, ${task.id})" 
                                 onclick="viewTask(${task.id})">
                                ${task.title}
                            </div>
                        `).join('')}
                    </div>
                `;
                dashboard.appendChild(colEl);
            });
            
            const addCol = document.createElement('button');
            addCol.className = 'btn btn-ghost';
            addCol.textContent = '+ Add Column';
            addCol.onclick = openColumnModal;
            dashboard.appendChild(addCol);
        }

        function drag(ev, taskId) {
            ev.dataTransfer.setData("taskId", taskId);
            ev.target.classList.add('dragging');
        }

        function allowDrop(ev) { ev.preventDefault(); }

        async function drop(ev) {
            ev.preventDefault();
            const taskId = ev.dataTransfer.getData("taskId");
            const columnId = ev.currentTarget.dataset.columnId;
            
            const res = await fetch(`/api/v1/tasks/${taskId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ column_id: parseInt(columnId) })
            });
            if (res.ok) init();
        }

        function openModal(title, content, actionLabel, actionFn) {
            modalTitle.textContent = title;
            modalContent.innerHTML = content;
            modalAction.textContent = actionLabel;
            modalAction.onclick = actionFn;
            modalOverlay.style.display = 'flex';
        }

        function closeModal() { modalOverlay.style.display = 'none'; }

        function openTaskModal(colId) {
            const content = `
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="taskTitle" placeholder="What needs to be done?">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="taskDesc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Tags (comma separated)</label>
                    <input type="text" id="taskTags" placeholder="urgent, fix">
                </div>
            `;
            openModal('New Task', content, 'Create Task', async () => {
                const title = document.getElementById('taskTitle').value;
                const description = document.getElementById('taskDesc').value;
                const tags = document.getElementById('taskTags').value;
                const res = await fetch('/api/v1/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description, tags, column_id: colId })
                });
                if (res.ok) { closeModal(); init(); }
            });
        }

        function openColumnModal() {
            const content = `
                <div class="form-group">
                    <label>Column Name</label>
                    <input type="text" id="colName" placeholder="Doing, Testing, etc.">
                </div>
            `;
            openModal('New Column', content, 'Create Column', async () => {
                const name = document.getElementById('colName').value;
                const res = await fetch('/api/v1/columns', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, board_id: currentBoard.id })
                });
                if (res.ok) { closeModal(); init(); }
            });
        }

        async function viewTask(taskId) {
            // Find task locally for speed
            let task = null;
            currentBoard.columns.forEach(c => {
                const found = c.tasks.find(t => t.id === taskId);
                if (found) task = found;
            });

            const content = `
                <div style="color: #94a3b8; font-size: 0.875rem; margin-bottom: 1rem;">ID: #${task.id}</div>
                <h2 style="margin: 0 0 1rem 0;">${task.title}</h2>
                <p style="white-space: pre-wrap; line-height: 1.6;">${task.description || 'No description provided.'}</p>
                <div style="margin-top: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
                    ${(task.tags || '').split(',').map(t => t.trim()).filter(t => t).map(t => `
                        <span style="background: var(--accent); color: var(--bg); font-size: 0.75rem; padding: 2px 8px; border-radius: 99px; font-weight: 600;">${t}</span>
                    `).join('')}
                </div>
            `;
            openModal('Task Details', content, 'Close', closeModal);
        }

        init();
    </script>
</body>
</html>
