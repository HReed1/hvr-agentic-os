<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kanban</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 40px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    #btn-new-task { 
        background: rgba(255, 255, 255, 0.1); 
        border: 1px solid rgba(255, 255, 255, 0.2); 
        padding: 10px 20px; 
        color: white; 
        border-radius: 8px; 
        cursor: pointer; 
        backdrop-filter: blur(10px);
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        transition: background 0.2s;
    }
    #btn-new-task:hover { background: rgba(255, 255, 255, 0.2); }
    .board { display: flex; gap: 24px; overflow-x: auto; padding-bottom: 20px; }
    .kanban-column { 
        background: rgba(255, 255, 255, 0.05); 
        border: 1px solid rgba(255, 255, 255, 0.1); 
        border-radius: 12px; 
        width: 320px; 
        min-height: 500px; 
        padding: 20px; 
        display: flex; 
        flex-direction: column; 
        gap: 12px; 
        backdrop-filter: blur(12px);
    }
    .kanban-column h3 { margin-top: 0; font-weight: 600; font-size: 16px; margin-bottom: 8px; color: #e0e0e0; }
    .kanban-task { 
        background: rgba(255, 255, 255, 0.08); 
        padding: 16px; 
        border-radius: 8px; 
        cursor: grab; 
        transition: transform 0.2s, background 0.2s; 
        border: 1px solid rgba(255, 255, 255, 0.1); 
    }
    .kanban-task:active { cursor: grabbing; }
    .kanban-task:hover { transform: translateY(-2px); background: rgba(255, 255, 255, 0.15); }
    .modal { 
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); 
        justify-content: center; align-items: center; z-index: 1000;
    }
    .modal-content { 
        background: #1e1e1e; padding: 30px; border-radius: 16px; width: 400px; 
        border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; gap: 16px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .modal-content h2 { margin: 0; font-size: 20px; }
    input, textarea { 
        background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
        padding: 12px; border-radius: 8px; color: white; font-family: 'Inter', sans-serif; 
        outline: none; transition: border 0.2s;
    }
    input:focus, textarea:focus { border: 1px solid rgba(255, 255, 255, 0.3); }
    textarea { resize: vertical; min-height: 80px; }
    button { 
        background: #4caf50; border: none; padding: 12px; color: white; border-radius: 8px; 
        cursor: pointer; font-weight: 600; font-family: 'Inter', sans-serif; transition: background 0.2s;
    }
    button:hover { background: #45a049; }
    .close-btn { background: rgba(255, 255, 255, 0.1); }
    .close-btn:hover { background: rgba(255, 255, 255, 0.2); }
</style>
</head>
<body>

<div class="header">
    <h1>Kanban</h1>
    <button id="btn-new-task">New Task</button>
</div>

<div class="board" id="board-container"></div>

<div class="modal" id="task-modal">
    <div class="modal-content">
        <h2>Create Task</h2>
        <input type="text" id="task-title-input" placeholder="Title">
        <textarea id="task-desc-input" placeholder="Description"></textarea>
        <input type="text" id="task-tags-input" placeholder="Tags (comma separated)">
        <input type="hidden" id="target-column-id">
        <button id="btn-save-task">Save Task</button>
        <button class="close-btn" onclick="document.getElementById('task-modal').style.display='none'">Cancel</button>
    </div>
</div>

<div class="modal" id="task-detail-modal">
    <div class="modal-content">
        <h2 id="detail-title"></h2>
        <p id="detail-desc"></p>
        <p><small id="detail-tags" style="color: #aaa;"></small></p>
        <button class="close-btn" onclick="document.getElementById('task-detail-modal').style.display='none'">Close</button>
    </div>
</div>

<script>
    let boardData = null;
    let draggedTaskId = null;

    async function loadBoard() {
        const res = await fetch('/api/board');
        boardData = await res.json();
        renderBoard();
    }

    function renderBoard() {
        const container = document.getElementById('board-container');
        container.innerHTML = '';
        if (!boardData.columns) return;
        
        boardData.columns.forEach(col => {
            const colDiv = document.createElement('div');
            colDiv.className = 'kanban-column';
            colDiv.innerHTML = `<h3>${col.name}</h3>`;
            colDiv.dataset.id = col.id;
            
            colDiv.addEventListener('dragover', e => {
                e.preventDefault();
            });
            
            colDiv.addEventListener('drop', async e => {
                e.preventDefault();
                let taskId = e.dataTransfer.getData('text/plain');
                if (!taskId) taskId = draggedTaskId;
                if (taskId) {
                    await moveTask(parseInt(taskId), col.id);
                }
                draggedTaskId = null;
            });

            col.tasks.forEach(task => {
                const taskDiv = document.createElement('div');
                taskDiv.className = 'kanban-task';
                taskDiv.textContent = task.title;
                taskDiv.draggable = true;
                
                taskDiv.addEventListener('dragstart', e => {
                    draggedTaskId = task.id;
                    e.dataTransfer.setData('text/plain', task.id);
                });
                
                taskDiv.addEventListener('click', () => {
                    document.getElementById('detail-title').textContent = task.title;
                    document.getElementById('detail-desc').textContent = task.description;
                    document.getElementById('detail-tags').textContent = task.tags;
                    document.getElementById('task-detail-modal').style.display = 'flex';
                });

                colDiv.appendChild(taskDiv);
            });
            container.appendChild(colDiv);
        });
    }

    document.getElementById('btn-new-task').addEventListener('click', () => {
        if (!boardData || !boardData.columns || boardData.columns.length === 0) return;
        document.getElementById('target-column-id').value = boardData.columns[0].id;
        document.getElementById('task-title-input').value = '';
        document.getElementById('task-desc-input').value = '';
        document.getElementById('task-tags-input').value = '';
        document.getElementById('task-modal').style.display = 'flex';
    });

    document.getElementById('btn-save-task').addEventListener('click', async () => {
        const title = document.getElementById('task-title-input').value;
        const desc = document.getElementById('task-desc-input').value;
        const tags = document.getElementById('task-tags-input').value;
        const colId = parseInt(document.getElementById('target-column-id').value);
        
        const newTask = { id: Date.now(), title, description: desc, tags };
        boardData.columns.find(c => c.id === colId).tasks.push(newTask);
        renderBoard();
        document.getElementById('task-modal').style.display = 'none';

        const res = await fetch('/api/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, description: desc, tags, column_id: colId })
        });
        const data = await res.json();
        const finalTask = boardData.columns.find(c => c.id === colId).tasks.find(t => t.id === newTask.id);
        if(finalTask) finalTask.id = data.id; 
    });

    async function moveTask(taskId, newColId) {
        let taskToMove = null;
        for (const col of boardData.columns) {
            const idx = col.tasks.findIndex(t => t.id === taskId);
            if (idx > -1) {
                taskToMove = col.tasks.splice(idx, 1)[0];
                break;
            }
        }
        if (taskToMove) {
            boardData.columns.find(c => c.id === newColId).tasks.push(taskToMove);
            renderBoard();
        }

        await fetch(`/api/tasks/${taskId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ column_id: newColId })
        });
    }

    loadBoard();
</script>

</body>
</html>
