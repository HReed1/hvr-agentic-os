<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            height: 100vh; display: flex; align-items: center; justify-content: center; color: white; font-family: sans-serif; 
        }
        .card { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 2rem; border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>System Uptime</h1>
        <div id="status">Checking...</div>
    </div>
    <script>
        setInterval(async () => {
            const res = await fetch('/api/v1/ping');
            const data = await res.json();
            document.getElementById('status').innerText = `Status: ${data.status} | Time: ${new Date(data.timestamp * 1000).toLocaleTimeString()}`;
        }, 3000);
    </script>
</body>
</html>
